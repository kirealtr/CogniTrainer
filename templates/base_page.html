{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block page-title %}Think Slow{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <div class="top-row">
                <div class="brand">Think Slow</div>
                <nav class="menu">
                    <a href="/">Главная</a>
                    <a href="/biases-list">Список искажений</a>
                    <a href="/add-bias">Добавить карточку</a>
                    <a href="/quiz">Квиз</a>
                    <a href="/stats">Статистика</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <h1>{% block hero-title %}{% endblock %}</h1>
            <p class="lead">{% block page-lead %}{% endblock %}</p>
        </section>

        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container">
            Учебный проект на Django · 2026
        </div>
    </footer>
</body>
</html>
